<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heart Pulse WebAR</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  
  <style>
    body { 
      margin: 0; 
      background: radial-gradient(circle at center, #ffffff 0%, #e8e8e8 100%);
      overflow: hidden;
      height: 100vh;
      font-family: -apple-system, system-ui, sans-serif;
    }

    model-viewer { 
      width: 100vw; 
      height: 100vh; 
      --poster-color: transparent;
    }

    /* Targeting the default button position if needed */
    model-viewer::part(default-ar-button) {
      bottom: 110px; /* Moves it up so it doesn't overlap the bottom controls */
    }

    .controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px 20px;
      border-radius: 50px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .heart-btn {
      padding: 10px 20px;
      border-radius: 30px;
      border: none;
      background: #eee;
      color: #333;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .heart-btn.active {
      background: #e91e63;
      color: white;
    }
  </style>
</head>
<body>

<model-viewer 
  id="heartViewer"
  src="./Heartmodel/Android/Heartmodel1.glb" 
  ios-src="./Heartmodel/IOS/Heartmodel1.usdz"
  ar 
  ar-modes="webxr scene-viewer quick-look"
  ar-placement="floor"
  camera-controls 
  autoplay
  shadow-intensity="1"
  environment-image="neutral"
  camera-orbit="0deg 75deg 20m">
</model-viewer>



<div class="controls">
  <button class="heart-btn active" 
          data-src="./Heartmodel/Android/Heartmodel1.glb" 
          data-ios="./Heartmodel/IOS/Heartmodel1.usdz"
          data-audio="false">HEART</button>

  <button class="heart-btn" 
          data-src="./Heartmodel/Android/HeartLabels1.glb" 
          data-ios="./Heartmodel/IOS/HeartLabels1.usdz"
          data-audio="true">LABELS</button>
</div>

<audio id="labelAudio" src="./audio/heart_labels_audio.mp3" loop></audio>

<script>
  const modelViewer = document.querySelector('#heartViewer');
  const buttons = document.querySelectorAll('.heart-btn');
  const audio = document.getElementById("labelAudio");

  buttons.forEach(btn => {
    btn.addEventListener('click', async () => {
      // Toggle Active State
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // Update Model Sources
      modelViewer.setAttribute('src', btn.dataset.src);
      modelViewer.setAttribute('ios-src', btn.dataset.ios);
      
      // Audio Logic
      if (btn.dataset.audio === "true") {
        audio.play().catch(() => console.log("User interaction required for audio"));
      } else {
        audio.pause();
        audio.currentTime = 0;
      }
    });
  });

  // Ensure animations play after source changes
  modelViewer.addEventListener('load', () => {
    modelViewer.play();
  });
</script>

</body>
</html>
