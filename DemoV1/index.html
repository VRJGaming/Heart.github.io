<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart AR Slider Control</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; }
    model-viewer { width: 100vw; height: 100vh; }

    /* The Slider Container - This stays visible in AR */
    .slider-container {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.7);
      padding: 15px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    #rotate-slider {
      width: 100%;
      cursor: pointer;
    }

    .label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 14px; }
  </style>
</head>
<body>

  <model-viewer 
    id="heart"
    src="./Heartmodel/Android/Heartmodel.glb"
    ar 
    /* Force WebXR so the slider doesn't disappear */
    ar-modes="webxr scene-viewer"
    camera-controls
    disable-pan
    shadow-intensity="1"
    exposure="1.2">

    <div class="slider-container">
      <span class="label">ROTATE HEART</span>
      <input type="range" id="rotate-slider" min="0" max="360" value="0">
    </div>

    <button slot="ar-button" style="background: white; border-radius: 8px; border: 1px solid #ccc; padding: 10px; position: absolute; top: 20px; right: 20px;">
      START AR
    </button>
  </model-viewer>

  <script>
    const modelViewer = document.querySelector("#heart");
    const slider = document.querySelector("#rotate-slider");

    // Listen to the slider and update the Y-axis rotation (theta)
    slider.addEventListener('input', (event) => {
      const value = event.target.value;
      // camera-orbit format: [theta] [phi] [radius]
      // We only change theta (horizontal rotation)
      modelViewer.cameraOrbit = `${value}deg 75deg 105%`;
    });

    // Reset slider if user rotates with their finger manually
    modelViewer.addEventListener('camera-change', () => {
      const orbit = modelViewer.getCameraOrbit();
      // Convert radians to degrees
      const degrees = (orbit.theta * 180 / Math.PI);
      slider.value = degrees;
    });
  </script>
</body>
</html>
