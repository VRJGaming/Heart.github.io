<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Pulse Experience</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    body { 
      margin: 0; 
      background: #ffffff; /* Updated to solid white */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
      overflow: hidden;
      height: 100vh;
    }

    model-viewer { 
      width: 100vw; 
      height: 100vh; 
      --poster-color: transparent;
    }

    /* Bottom Control Bar */
    .controls {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.08); /* Darker tint for white background contrast */
      padding: 8px;
      border-radius: 50px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .heart-btn {
      padding: 12px 24px;
      border-radius: 40px;
      border: 1px solid rgba(0,0,0,0.1);
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .heart-btn.active {
      background: #4a0404;
      color: #fff;
      border-color: #4a0404;
      box-shadow: 0 4px 10px rgba(74, 4, 4, 0.3);
    }
  </style>
</head>
<body>

<model-viewer 
  id="heartViewer"
  src="./Heartmodel/Android/Heartmodel1.glb" 
  ios-src="./Heartmodel/IOS/Heartmode1.usdz"
  ar 
  ar-modes="webxr scene-viewer quick-look"
  camera-controls 
  autoplay
  interaction-prompt="none"
  exposure="1.2" 
  shadow-softness="1"
  camera-orbit="0deg 75deg 20m" 
  field-of-view="10deg">
  </model-viewer>

<div class="controls">
  <button class="heart-btn active" 
          data-src="./Heartmodel/Android/Heartmodel1.glb" 
          data-ios="./Heartmodel/IOS/Heartmode1.usdz"
          data-orbit="0deg 75deg 20m" 
          data-fov="10deg"
          data-audio="false">Heart</button>

  <button class="heart-btn" 
          data-src="./Heartmodel/Android/HeartLabels1.glb" 
          data-ios="./Heartmodel/IOS/HeartLabels1.usdz"
          data-orbit="0deg 75deg 2.5m" 
          data-fov="30deg"
          data-audio="true">Labels</button>
</div>

<audio id="labelAudio" src="./audio/heart_labels_audio1.mp3" loop></audio>

<script>
  const modelViewer = document.querySelector('#heartViewer');
  const buttons = document.querySelectorAll('.heart-btn');
  const audio = document.getElementById("labelAudio");

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      // 1. UI Switch
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // 2. Load Models (Both GLB and USDZ)
      modelViewer.src = btn.dataset.src;
      modelViewer.iosSrc = btn.dataset.ios;
      
      // 3. Apply Distance/Scale
      modelViewer.cameraOrbit = btn.dataset.orbit;
      modelViewer.fieldOfView = btn.dataset.fov;

      // 4. Audio Control
      if (btn.dataset.audio === "true") {
        audio.play().catch(() => console.log("Audio play requires user gesture"));
      } else {
        audio.pause();
        audio.currentTime = 0;
      }
    });
  });
</script>

</body>
</html>
