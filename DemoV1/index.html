<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Pulse Experience</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    body { 
      margin: 0; 
      background: #ffffff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
      overflow: hidden;
      height: 100vh;
    }

    model-viewer { 
      width: 100vw; 
      height: 100vh; 
      --poster-color: transparent;
    }

    /* MOVE THE DEFAULT AR BUTTON UP */
    /* This targets the built-in button so it doesn't sit behind the bottom controls */
    #heartViewer::part(default-ar-button) {
      bottom: 110px; /* Moves it above the bottom control bar */
      right: 20px;   /* Standard side placement */
    }

    /* Bottom Control Bar Styling */
    .controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.05);
      padding: 10px;
      border-radius: 50px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .heart-btn {
      padding: 12px 24px;
      border-radius: 40px;
      border: 1px solid #ddd;
      background: white;
      color: #333;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .heart-btn.active {
      background: #4a0404;
      color: #fff;
      border-color: #4a0404;
      box-shadow: 0 4px 12px rgba(74, 4, 4, 0.2);
    }
  </style>
</head>
<body>

<model-viewer 
  id="heartViewer"
  src="./Heartmodel/Android/Heartmodel1.glb" 
  ios-src="./Heartmodel/IOS/Heartmode1.usdz"
  ar 
  ar-modes="webxr scene-viewer quick-look"
  camera-controls 
  autoplay
  interaction-prompt="none"
  exposure="1.2" 
  shadow-softness="1"
  camera-orbit="0deg 75deg 20m" 
  field-of-view="10deg">
  </model-viewer>

<div class="controls">
  <button class="heart-btn active" 
          data-src="./Heartmodel/Android/Heartmodel1.glb" 
          data-ios="./Heartmodel/IOS/Heartmode1.usdz"
          data-orbit="0deg 75deg 20m" 
          data-fov="10deg"
          data-audio="false">Heart</button>

  <button class="heart-btn" 
          data-src="./Heartmodel/Android/HeartLabels1.glb" 
          data-ios="./Heartmodel/IOS/HeartLabels1.usdz"
          data-orbit="0deg 75deg 2.5m" 
          data-fov="30deg"
          data-audio="true">Labels</button>
</div>

<audio id="labelAudio" src="./audio/heart_labels_audio1.mp3" loop></audio>

<script>
  const modelViewer = document.querySelector('#heartViewer');
  const buttons = document.querySelectorAll('.heart-btn');
  const audio = document.getElementById("labelAudio");

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      // Update UI
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // Update Models for both platforms
      modelViewer.src = btn.dataset.src;
      modelViewer.iosSrc = btn.dataset.ios;
      
      // Update Camera
      modelViewer.cameraOrbit = btn.dataset.orbit;
      modelViewer.fieldOfView = btn.dataset.fov;

      // Audio Logic
      if (btn.dataset.audio === "true") {
        audio.play().catch(() => console.log("User interaction required for audio"));
      } else {
        audio.pause();
        audio.currentTime = 0;
      }
    });
  });
</script>

</body>
</html>
