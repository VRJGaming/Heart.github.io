<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heart Pulse Experience</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  
  <style>
    :root { --ui-accent: #e91e63; }

    body { 
      margin: 0; 
      background: radial-gradient(circle at center, #ffffff 0%, #e8e8e8 100%);
      overflow: hidden;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    model-viewer { 
      width: 100vw; 
      height: 100vh; 
      --poster-color: transparent;
      touch-action: none; 
    }

    /* Moves the default AR button up so it doesn't block the Heart/Labels buttons */
    model-viewer::part(default-ar-button) {
      bottom: 120px; 
      right: 20px;
    }

    .controls {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.6);
      padding: 10px;
      border-radius: 50px;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .heart-btn {
      padding: 12px 28px;
      border-radius: 40px;
      border: none;
      background: rgba(0, 0, 0, 0.05);
      color: #333;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .heart-btn.active {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>

<model-viewer 
  id="heartViewer"
  src="./Heartmodel/Android/Heartmodel1.glb" 
  ios-src="./Heartmodel/IOS/Heartmodel1.usdz"
  ar 
  ar-modes="quick-look webxr scene-viewer"
  ar-placement="floor"
  camera-controls 
  autoplay
  animation-name="*" 
  interaction-prompt="none"
  exposure="1.1" 
  shadow-intensity="1"
  environment-image="neutral"
  camera-orbit="0deg 75deg 20m">
</model-viewer>



<div class="controls">
  <button class="heart-btn active" 
          data-src="./Heartmodel/Android/Heartmodel1.glb" 
          data-ios="./Heartmodel/IOS/Heartmodel1.usdz"
          data-audio="false">Heart</button>

  <button class="heart-btn" 
          data-src="./Heartmodel/Android/HeartLabels1.glb" 
          data-ios="./Heartmodel/IOS/HeartLabels1.usdz"
          data-audio="true">Labels</button>
</div>

<audio id="labelAudio" src="./audio/heart_labels_audio.mp3" loop></audio>

<script>
  const modelViewer = document.querySelector('#heartViewer');
  const buttons = document.querySelectorAll('.heart-btn');
  const audio = document.getElementById("labelAudio");

  buttons.forEach(btn => {
    btn.addEventListener('click', async () => {
      // UI Update
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // Update AR Sources (Crucial for iOS Safari stability)
      modelViewer.setAttribute('src', btn.dataset.src);
      modelViewer.setAttribute('ios-src', btn.dataset.ios);
      
      // Wait for the component to process the new model
      await modelViewer.updateComplete;

      // Audio Logic
      if (btn.dataset.audio === "true") {
        audio.play().catch(() => {
          console.log("Tap anywhere on the screen first to enable audio");
        });
      } else {
        audio.pause();
        audio.currentTime = 0;
      }
    });
  });

  // Re-trigger animation play when model changes
  modelViewer.addEventListener('load', () => {
    modelViewer.play();
  });
</script>

</body>
</html>
