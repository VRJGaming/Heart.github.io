<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #f0f0f0; }
    model-viewer { width: 100vw; height: 100vh; }

    /* Points Styling */
    .btn {
      width: 30px; height: 30px; border-radius: 50%; border: 2px solid white;
      background: rgba(233, 30, 99, 0.8); color: white; font-weight: bold;
      cursor: grab; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.3); font-size: 10px;
    }
    .btn:active { cursor: grabbing; transform: scale(1.2); background: #2196F3; }
    
    #point-b { background: rgba(0, 0, 0, 0.5); }
    
    /* Help Label */
    .label { position: absolute; top: 10%; width: 100%; text-align: center; font-weight: bold; pointer-events: none; }
  </style>
</head>
<body>

  <div class="label">DRAG "A" TO "B" TO ROTATE</div>

  <model-viewer id="viewer" src="./Heartmodel/Android/Heartmodel.glb" ar ar-modes="webxr" camera-controls disable-pan>
    
    <button slot="ar-button" style="position: absolute; top: 20px; right: 20px; padding: 10px;">START AR</button>

    <button id="point-a" slot="hotspot-a" class="btn" data-position="0.2 0.5 0" data-normal="0 0 1">A</button>
    
    <button id="point-b" slot="hotspot-b" class="btn" data-position="-0.2 0.5 0" data-normal="0 0 1">B</button>

  </model-viewer>

  <script>
    const viewer = document.querySelector('#viewer');
    const pointA = document.querySelector('#point-a');
    const pointB = document.querySelector('#point-b');
    
    let isDragging = false;

    // We detect the drag from A
    pointA.addEventListener('mousedown', () => isDragging = true);
    pointA.addEventListener('touchstart', () => isDragging = true);

    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('touchend', () => isDragging = false);

    window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY));

    function handleMove(x, y) {
      if (!isDragging) return;

      // Get Point B's screen position
      const rectB = pointB.getBoundingClientRect();
      const bX = rectB.left + rectB.width / 2;
      
      // Calculate horizontal distance from finger to B
      const distance = bX - x;

      // If dragging toward B, rotate the model
      // We map the horizontal drag to the camera orbit
      viewer.cameraOrbit = `${distance * 0.5}deg 75deg 105%`;
    }
  </script>
</body>
</html>
