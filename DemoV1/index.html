<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #1a1a1a; }
    model-viewer { width: 100vw; height: 100vh; }

    /* The Hotspots - Must be visible and styled for AR */
    .dot {
      width: 35px; height: 35px; border-radius: 50%;
      border: 3px solid #fff; background: #e91e63;
      color: white; font-weight: bold; display: flex;
      align-items: center; justify-content: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      cursor: pointer; z-index: 1000;
    }
    
    .ar-controls {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%); display: flex; gap: 10px;
      z-index: 2000;
    }

    .nav-btn {
      padding: 12px 20px; border-radius: 20px; border: none;
      background: rgba(255,255,255,0.9); font-weight: bold;
    }
  </style>
</head>
<body>

  <model-viewer 
    id="heart"
    src="./Heartmodel/Android/Heartmodel.glb" 
    ar 
    /* WebXR is MANDATORY to keep HTML buttons visible in AR */
    ar-modes="webxr" 
    camera-controls 
    disable-pan
    shadow-intensity="2">

    <button slot="ar-button" style="position: absolute; top: 20px; right: 20px; padding: 15px; background: white; border-radius: 10px; border: none; font-weight: bold;">
      START AR
    </button>

    <button slot="hotspot-a" id="point-a" class="dot" data-position="0.1 0.2 0.1" data-normal="0 0 1">A</button>
    <button slot="hotspot-b" id="point-b" class="dot" data-position="-0.1 0.2 0.1" data-normal="0 0 1" style="background: #222;">B</button>

    <div class="ar-controls">
      <button class="nav-btn" onclick="document.querySelector('#heart').src='./Heartmodel/Android/Heartmodel.glb'">HEART</button>
      <button class="nav-btn" onclick="document.querySelector('#heart').src='./Heartmodel/Android/HeartLabels.glb'">LABELS</button>
    </div>

  </model-viewer>

  <script>
    const viewer = document.querySelector('#heart');
    let isDragging = false;

    // Detect touch on Point A
    document.querySelector('#point-a').addEventListener('touchstart', () => {
      isDragging = true;
    });

    window.addEventListener('touchend', () => isDragging = false);

    window.addEventListener('touchmove', (e) => {
      if (!isDragging) return;

      // Logic: Dragging finger horizontally rotates the model
      const touchX = e.touches[0].clientX;
      const rectB = document.querySelector('#point-b').getBoundingClientRect();
      const bX = rectB.left + rectB.width / 2;
      
      const distance = bX - touchX;
      viewer.cameraOrbit = `${distance * 1.5}deg 75deg 105%`;
    });
  </script>
</body>
</html>
