<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Heart Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #container { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #ffffff 0%, #dcdcdc 100%); }
        
        /* Model Selection UI */
        .controls {
            position: absolute; 
            bottom: 80px; /* Moved up to avoid overlapping default AR button */
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            gap: 10px; 
            z-index: 10;
            background: rgba(255,255,255,0.8); 
            padding: 10px; 
            border-radius: 50px; 
            backdrop-filter: blur(10px);
        }
        .heart-btn {
            padding: 10px 20px; 
            border-radius: 20px; 
            border: none;
            background: #222; 
            color: #fff; 
            cursor: pointer; 
            font-weight: bold;
        }
        .heart-btn.active { background: #e91e63; }
    </style>
</head>
<body>

    <div id="container"></div>

    <div class="controls">
        <button class="heart-btn active" data-path="./Heartmodel/Android/Heartmodel.glb">HEART</button>
        <button class="heart-btn" data-path="./Heartmodel/Android/HeartLabels.glb">LABELS</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        let scene, camera, renderer, controls, loader, heart, mixer;
        let clock = new THREE.Clock();

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true; 
            renderer.toneMapping = THREE.NeutralToneMapping;
            document.getElementById('container').appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 1.0));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(2, 2, 5);
            scene.add(dirLight);

            // Interaction
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.touches.ONE = THREE.TOUCH.ROTATE; 
            controls.touches.TWO = THREE.TOUCH.DOLLY_PAN;

            // Model Loading
            loader = new GLTFLoader();
            loadModel('./Heartmodel/Android/Heartmodel.glb');

            // --- DEFAULT AR BUTTON LOGIC ---
            // Append the default button directly to the body.
            // It will appear at the bottom of the screen automatically.
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'] 
            }));

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(render);
        }

        function loadModel(path) {
            if (heart) scene.remove(heart);
            loader.load(path, (gltf) => {
                heart = gltf.scene;
                heart.position.set(0, -0.5, 0);
                heart.scale.set(1.5, 1.5, 1.5);
                scene.add(heart);

                if (gltf.animations.length) {
                    mixer = new THREE.AnimationMixer(heart);
                    gltf.animations.forEach(clip => mixer.clipAction(clip).play());
                }
            });
        }

        document.querySelectorAll('.heart-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.heart-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadModel(btn.dataset.path);
            });
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render() {
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
